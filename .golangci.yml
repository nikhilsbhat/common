---
version: "2"

linters:
  default: all
  disable:
    - gochecknoglobals
    - tagliatelle
    - nolintlint
    - exhaustruct
    - forbidigo
    - paralleltest
    - cyclop
    - ireturn
    - wrapcheck
    - interfacebloat
    - forcetypeassert
    - dupl
    - goconst
    - depguard
    - tagalign
  settings:
    funlen:
      lines: 160

    lll:
      line-length: 165

    dupl:
      threshold: 450

    gocognit:
      min-complexity: 78

    nestif:
      min-complexity: 20
  exclusions:
    paths:
      - scripts/
      - vendor/
      - docs/
      - example/
      - Makefile
      - README.md
      - Dockerfile
    rules:
      - path: _test\.go
        linters:
          - mnd

      # https://github.com/go-critic/go-critic/issues/926
      - linters:
          - gocritic
        text: "unnecessaryDefer:"

run:
  concurrency: 10
  timeout: 10m
  issues-exit-code: 1
  tests: true

severity:
  default: error
